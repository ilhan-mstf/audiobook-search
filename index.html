<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Audiobook Search — Find Free & Paid Audiobooks Across All Platforms</title>
    <meta name="description" content="Search for any audiobook and instantly see where it's available — free on LibriVox, Internet Archive, or paid on Audible, Apple Books, Spotify, and more. One search, all platforms." />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="rDxh3dzNQyIvH0YQqM-04x4JI0VIrmnRefzlruKbdjM" />
    <link rel="canonical" href="https://audiobook-search.pages.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://audiobook-search.pages.dev/" />
    <meta property="og:title" content="Audiobook Search — Find Free & Paid Audiobooks Across All Platforms" />
    <meta property="og:description" content="Search for any audiobook and instantly see where it's available — free on LibriVox, Internet Archive, or paid on Audible, Apple Books, Spotify, and more." />
    <meta property="og:image" content="https://audiobook-search.pages.dev/og.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Audiobook Search — Find Free & Paid Audiobooks Across All Platforms" />
    <meta name="twitter:description" content="Search for any audiobook and instantly see where it's available — free or paid — across all platforms at once." />
    <meta name="twitter:image" content="https://audiobook-search.pages.dev/og.png" />

    <!-- JSON-LD: Website + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Audiobook Search",
      "url": "https://audiobook-search.pages.dev/",
      "description": "Search for any audiobook and instantly see where it's available — free or paid — across all platforms at once.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://audiobook-search.pages.dev/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08080d" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
      }
    </script>
  </body>
</html>
